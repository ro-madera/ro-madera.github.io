bio: |
  I am an Assistant Professor in the Department of Economics at Southern Methodist University and a Research Affiliate of the CESifo Research Network. My research combines rich micro-data with quantitative macroeconomic and labor-market models to study income risk, consumption, policy design, and household welfare.

