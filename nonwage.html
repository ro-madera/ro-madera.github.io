												This paper delivers new insights on joint labor income dynamics, with a focus on different sources of co-movements of incomes within couples due to assortative mating. When turning from individual incomes to joint incomes of couples, several mechanisms are at work simultaneously. A widely studied active insurance channel of couples against income losses is through spousal labor supply adjustments—sometimes referred to as “added worker effect”—. An unexplored channel is the degree to which couples are exposed to correlated risks: it can be expected that couples are exposed to similar shocks, be it due to living in the same location, working on the same company, or sharing a similar career. As a result, their ability to insure against each others income risk is limited and, under certain assortative mating patterns, might result in increased risk at the family level. Considering the degree of sorting among spouses along the characteristics education and career is therefore crucial to understanding the exposure of individuals and couples to earnings risk, their capability to self-insure against income risk, and, ultimately, to measure the welfare benefits of different programs aimed at decreasing this exposure to risk. We use rich tax register data from Denmark that features detailed income information on both partners, before and after matching. This allows us to explore empirical regularities in matching patterns of couples and take high-resolution pictures of the income dynamics of males, females, and the joint income dynamics of couples.
